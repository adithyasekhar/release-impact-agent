name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest
      - run: ruff check .
      - name: Smoke-test the CLI end to end
        run: |
          release-impact run tests/fixtures/studio_workspace \
            --notes examples/release-notes-2026R2-sample.csv \
            --release-label 2026R2 --no-claude --outdir /tmp/reports
          test -s /tmp/reports/impact-report.md
          test -s /tmp/reports/impact-report.html
